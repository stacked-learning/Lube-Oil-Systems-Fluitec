<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Stacked Learning | Gas Turbine Lube Oil Systems Varnish Fluitec</title>

    <meta property="og:description" content= "Stacked Learning offers High-End Engineering Principles via interactive and globally accessible modules in forms of games and interactive simullations/learnings.">
    <meta property="og:image" content="https://stacked-learning.com/wp-content/uploads/2021/12/Lube-Oil-Banner-Photo.jpg">
    <meta property="og:type" content="website">
    
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body style="background-color:#151821;">
    <div id="unity-container" class="unity-desktop">
      <div id="unity-gate" class="unity-gate">
        <div class="unity-gate-card">
          <p class="unity-gate-kicker">Protected Module</p>
          <h1 class="unity-gate-title">Enter password to continue</h1>
          <p class="unity-gate-copy">Use the access password supplied for this module.</p>
          <form id="unity-password-form" class="unity-password-form">
            <label class="unity-gate-label" for="unity-password-input">Password</label>
            <input id="unity-password-input" class="unity-password-input" type="password" autocomplete="current-password">
            <button id="unity-password-button" class="unity-password-button" type="submit">Unlock Module</button>
          </form>
          <p id="unity-password-error" class="unity-password-error" role="alert" aria-live="polite"></p>
        </div>
      </div>
      <canvas id="unity-canvas" width=1024 height=576></canvas>
      <div id="unity-loading-bar">
        <div width=200>
          <p class="load_warning" width=200>Please wait while the module loads. This may take a few minutes...</p>
        </div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-mobile-warning">
        Mobile device detected: Rotate to horizontal mode. [[ Use PC for best experience ]]
      </div>
      <div id="unity-footer">
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Gas Turbine Lube Oil Systems Varnish Fluitec</div>
      </div>
    </div>
    <script>
      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/7fd046b4c024da7c1c181fafc640fadc.loader.js";
      var config = {
        dataUrl: buildUrl + "/6a294c0bad4ba83a652040255a377dce.data.unityweb",
        frameworkUrl: buildUrl + "/ed1af6b193a7b1c3c8f1fa4b65057a98.framework.js.unityweb",
        codeUrl: buildUrl + "/97ecf0191fa1f01ff902039ed4983209.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Stacked Learning",
        productName: "Gas Turbine Lube Oil Systems Varnish Fluitec",
        productVersion: "2026-04-21",
      };

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var mobileWarning = document.querySelector("#unity-mobile-warning");
      var gate = document.querySelector("#unity-gate");
      var passwordForm = document.querySelector("#unity-password-form");
      var passwordInput = document.querySelector("#unity-password-input");
      var passwordButton = document.querySelector("#unity-password-button");
      var passwordError = document.querySelector("#unity-password-error");
      var accessSessionKey = "unity-access:" + config.companyName + ":" + config.productName;
      // Replace this with the SHA-256 hash of the password you want to require.
      var passwordHash = "454435e7a92e6ae2ea9e0e32d66be9c744176a27f69df6655107087f0bed119e";
      var unityHasStarted = false;

      function setPasswordError(message) {
        passwordError.textContent = message;
      }

      function rememberSessionAccess() {
        try {
          sessionStorage.setItem(accessSessionKey, "true");
        } catch (error) {
          console.warn("Unable to persist password state for this session.", error);
        }
      }

      function hasSessionAccess() {
        try {
          return sessionStorage.getItem(accessSessionKey) === "true";
        } catch (error) {
          console.warn("Unable to read password state for this session.", error);
          return false;
        }
      }

      async function sha256Hex(value) {
        var encodedValue = new TextEncoder().encode(value);
        var digest = await crypto.subtle.digest("SHA-256", encodedValue);
        return Array.from(new Uint8Array(digest), (byte) => byte.toString(16).padStart(2, "0")).join("");
      }

      function startUnity() {
        if (unityHasStarted) {
          return;
        }

        unityHasStarted = true;
        loadingBar.style.display = "block";

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
          createUnityInstance(canvas, config, (progress) => {
            progressBarFull.style.width = 100 * progress + "%";
          }).then((unityInstance) => {
            loadingBar.style.display = "none";
            fullscreenButton.onclick = () => {
              unityInstance.SetFullscreen(1);
            };
          }).catch((message) => {
            alert(message);
          });
        };
        document.body.appendChild(script);
      }

      function unlockGate() {
        gate.classList.add("is-hidden");
        setPasswordError("");
        passwordInput.value = "";
        rememberSessionAccess();
        startUnity();
      }

      // By default Unity keeps WebGL canvas render target size matched with
      // the DOM size of the canvas element (scaled by window.devicePixelRatio)
      // Set this to false if you want to decouple this synchronization from
      // happening inside the engine, and you would instead like to size up
      // the canvas DOM size and WebGL render target sizes yourself.
      // config.matchWebGLToCanvasSize = false;

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        container.className = "unity-mobile";
        // Avoid draining fillrate performance on mobile devices,
        // and default/override low DPI mode on mobile browsers.
        config.devicePixelRatio = 1;
        mobileWarning.style.display = "block";
        setTimeout(() => {
          mobileWarning.style.display = "none";
        }, 5000);
      } else {
        canvas.style.height = "100%";
        canvas.style.aspectRatio = 16/9;
        
        //canvas.style.width = "1024px";
        //canvas.style.height = "576px";
      }

      document.getElementById("unity-container").style.width = "100%";
      //document.getElementById("unity-container").style.height = "100%";
      document.getElementById("unity-container").style.aspectRatio = 16/9;

      passwordForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        setPasswordError("");

        if (passwordHash === "REPLACE_WITH_SHA256_HASH") {
          setPasswordError("Set a password hash in index.html before publishing.");
          return;
        }

        if (!passwordInput.value) {
          setPasswordError("Enter the password.");
          passwordInput.focus();
          return;
        }

        passwordButton.disabled = true;
        passwordInput.disabled = true;
        var shouldSelectPassword = false;

        try {
          var submittedHash = await sha256Hex(passwordInput.value);
          if (submittedHash === passwordHash.toLowerCase()) {
            unlockGate();
            return;
          }

          setPasswordError("Incorrect password.");
          shouldSelectPassword = true;
        } catch (error) {
          console.error(error);
          setPasswordError("Password verification is not available in this browser.");
        }

        passwordButton.disabled = false;
        passwordInput.disabled = false;
        if (shouldSelectPassword) {
          passwordInput.select();
        } else {
          passwordInput.focus();
        }
      });

      if (hasSessionAccess()) {
        unlockGate();
      } else {
        passwordInput.focus();
      }
    </script>
  </body>
</html>
